<!DOCTYPE html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Layer Palette</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body class="h-full bg-gray-50 text-gray-900 flex flex-col">

    <!-- Header -->
    <header class="flex-none bg-white border-b border-gray-200 px-4 py-3 flex items-center gap-4 z-10">
      <div class="flex flex-col flex-none">
        <span class="text-base font-semibold text-gray-900 leading-tight">Layer Palette</span>
        <span class="text-xs text-gray-400 leading-tight">Curated ArcGIS layers for composing beautiful custom basemaps</span>
      </div>

      <!-- Search -->
      <div class="flex-1 max-w-xl relative">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        <input
          id="search-input"
          type="search"
          placeholder="Search assets..."
          class="w-full pl-9 pr-4 py-1.5 text-sm border border-gray-300 rounded-lg bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
        />
      </div>

      <!-- Cache status -->
      <div id="cache-status" class="flex-none text-xs text-gray-400 flex items-center gap-2">
        <span id="cache-age-text"></span>
        <button
          id="refresh-all-btn"
          title="Refresh all items"
          class="text-gray-400 hover:text-gray-600 transition-colors hidden"
        >· Refresh all</button>
      </div>
    </header>

    <!-- Main layout -->
    <div class="flex flex-1 min-h-0">

      <!-- Sidebar -->
      <aside class="flex-none w-52 bg-white border-r border-gray-200 flex flex-col overflow-y-auto scrollbar-thin">
        <nav class="p-2 flex flex-col gap-0.5" id="category-nav">
          <button
            data-category="all"
            class="category-btn w-full text-left px-3 py-2 rounded-lg text-sm font-medium flex items-center gap-2 transition-colors bg-blue-50 text-blue-700"
          >
            <span>All Assets</span>
            <span id="count-all" class="ml-auto text-xs font-normal text-blue-500"></span>
          </button>
        </nav>
      </aside>

      <!-- Content area -->
      <main class="flex-1 min-w-0 flex flex-col">

        <!-- Card grid view -->
        <div id="grid-view" class="flex-1 overflow-y-auto scrollbar-thin p-4 flex flex-col gap-3">
          <div id="type-filter-bar" class="flex flex-wrap gap-1.5"></div>
          <div id="card-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3">
          </div>
          <div id="empty-state" class="hidden flex-col items-center justify-center h-64 text-gray-400"></div>
        </div>

        <!-- Preview view (replaces grid) -->
        <div id="preview-view" class="hidden flex-1 flex flex-col min-h-0">
          <div class="flex-none flex items-center gap-3 px-4 py-2 bg-white border-b border-gray-200">
            <button
              id="back-btn"
              class="flex items-center gap-1.5 text-sm text-blue-600 hover:text-blue-800 font-medium transition-colors"
            >
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
              </svg>
              Back to grid
            </button>
            <div class="w-px h-4 bg-gray-300"></div>
            <span id="preview-title" class="text-sm font-medium text-gray-800 truncate flex-1"></span>
            <div id="preview-actions" class="flex items-center gap-2"></div>
          </div>
          <iframe
            id="preview-iframe"
            class="flex-1 w-full border-0"
            sandbox="allow-scripts allow-same-origin allow-popups allow-forms"
            loading="lazy"
          ></iframe>
        </div>

      </main>
    </div>

    <!-- Detail modal -->
    <div id="detail-modal" class="hidden fixed inset-0 z-40 flex items-center justify-center p-4">
      <div id="detail-backdrop" class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
      <div class="relative z-10 bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[88vh] flex flex-col overflow-hidden">

        <!-- Thumbnail header -->
        <div id="detail-thumb-wrap" class="flex-none relative bg-gray-100 overflow-hidden">
          <img id="detail-thumb" class="w-full object-cover max-h-52 scale-105 blur-sm" alt="" />
          <button id="detail-close"
            class="absolute top-3 right-3 p-1.5 bg-white/90 backdrop-blur-sm rounded-full text-gray-500 hover:text-gray-900 shadow transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>

        <!-- Scrollable body -->
        <div class="flex-1 overflow-y-auto scrollbar-thin p-6 space-y-5">

          <!-- Title + type -->
          <div class="flex items-start justify-between gap-3">
            <h2 id="detail-title" class="text-lg font-semibold text-gray-900 leading-snug"></h2>
            <div id="detail-type-badge" class="flex-none mt-0.5"></div>
          </div>

          <!-- Snippet -->
          <div id="detail-snippet-wrap">
            <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Summary</h3>
            <p id="detail-snippet" class="text-sm text-gray-700 leading-relaxed"></p>
          </div>

          <!-- Description -->
          <div id="detail-desc-wrap">
            <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Description</h3>
            <div id="detail-desc"
              class="text-sm text-gray-700 leading-relaxed [&_a]:text-blue-600 [&_a]:underline [&_ul]:list-disc [&_ul]:pl-5 [&_ol]:list-decimal [&_ol]:pl-5 [&_p]:mb-2 [&_h1]:font-bold [&_h2]:font-semibold [&_h3]:font-medium">
            </div>
          </div>

          <!-- Item ID -->
          <div id="detail-id-wrap">
            <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Item ID</h3>
            <div class="flex items-center gap-2">
              <code id="detail-id" class="flex-1 text-xs font-mono bg-gray-100 px-3 py-2 rounded-lg text-gray-700 truncate"></code>
              <button id="detail-copy-id"
                class="flex-none flex items-center gap-1.5 px-3 py-2 text-xs text-gray-600 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                </svg>
                Copy
              </button>
            </div>
          </div>

          <!-- Tags -->
          <div id="detail-tags-wrap">
            <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Tags</h3>
            <div id="detail-tags" class="flex flex-wrap gap-1.5"></div>
          </div>

          <!-- Type keywords -->
          <div id="detail-kw-wrap">
            <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Type Keywords</h3>
            <div id="detail-kw" class="flex flex-wrap gap-1.5"></div>
          </div>

        </div>

        <!-- Footer actions -->
        <div class="flex-none border-t border-gray-100 px-6 py-4 flex items-center justify-end gap-2">
          <a id="detail-page-link" href="#" target="_blank" rel="noopener"
            class="flex items-center gap-1.5 px-4 py-2 text-sm text-gray-600 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
            </svg>
            <span id="detail-page-label">Item Page</span>
          </a>
          <button id="detail-preview-btn"
            class="flex items-center gap-1.5 px-4 py-2 text-sm text-white bg-blue-600 rounded-lg hover:bg-blue-700 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.069A1 1 0 0121 8.868V15.13a1 1 0 01-1.447.899L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
            </svg>
            Preview in Map Viewer
          </button>
        </div>

      </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-4 left-1/2 -translate-x-1/2 bg-gray-800 text-white text-sm px-4 py-2 rounded-lg shadow-lg opacity-0 pointer-events-none transition-opacity duration-200 z-50">
      Copied!
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
