name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: blend-modes-explorer/package-lock.json

      - name: Build blend-modes-explorer
        working-directory: blend-modes-explorer
        run: |
          npm ci
          npm run build

      - name: Assemble site
        run: |
          mkdir -p _site
          rsync -a ./ _site/ \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.DS_Store' \
            --exclude 'blend-modes-explorer/node_modules/' \
            --exclude 'blend-modes-explorer/dist/' \
            --exclude 'blend-modes-explorer/assets/'

          cp blend-modes-explorer/dist/index.html _site/blend-modes-explorer/index.html
          cp -R blend-modes-explorer/dist/assets _site/blend-modes-explorer/assets

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
